<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Outliyr Framework</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Outliyr Framework documentation">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
    <link rel="stylesheet" href="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/light.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-breadcrumb@latest/dist/breadcrumb.min.css">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div id="app"></div>
    <div id="toc"></div>
    <script>
        window.$docsify = {
            name: 'Outliyr Framework',
            repo: '',
            relativePath: true,
            loadSidebar: true,
            tabs: {
                sync: false
            },
            alias: {
                '/_sidebar.md': '/SUMMARY.md',
                '/.*/_sidebar.md': '/SUMMARY.md',
            },
            search: {
                maxAge: 86400000, // Expiration time, the default one day
                paths: 'auto',
                placeholder: 'Type to search',

                // Localization
                placeholder: {
                  '/': 'Type to search',
                },

                noData: 'No Results!',
                depth: 2,

                hideOtherSidebarContent: false, // whether or not to hide other sidebar content
            },
            toc: {
                tocMaxLevel: 5,
                target: 'h2, h3, h4, h5, h6',
                ignoreHeaders:  ['<!-- {docsify-ignore} -->', '<!-- {docsify-ignore-all} -->']
            },
            pagination: {
                crossChapter: true,
                crossChapterText: true,
            },
            breadcrumb: {
                showHome: true,
                homeText: 'Outliyr',
                separator: ' &rsaquo; ',
                casing: 'capitalize',
                linkColor: 'var(--theme-color, #42b983)',
                size: 'small'
            },
            mermaidConfig: {
                querySelector: ".mermaid",
            },
            mermaidZoom: {
                minimumScale: 1,
                maximumScale: 5,
                zoomPannel: true
            },
            'flexible-alerts': {
                style: 'flat',
                note: { label: 'info' },
                info: { label: 'info', icon: 'icon-note', className: 'note' },
                warning: { label: 'warning' },
                attention: { label: 'attention' },
                danger: { label: 'danger', icon: 'icon-attention', className: 'attention' },
                success: { label: 'tip', icon: 'icon-tip', className: 'tip' },
                tip: { label: 'tip', icon: 'icon-tip', className: 'tip' },
                important: { label: 'important', icon: 'icon-important', className: 'important' },
            },
            plugins: [
                function mermaidReRenderPlugin(hook, vm) {
                    function reRenderMermaid(container) {
                        var nodes = container.querySelectorAll('.mermaid[data-mermaid-source]');
                        var toRender = [];
                        nodes.forEach(function(node) {
                            var svg = node.querySelector('svg');
                            var needsRender = !svg || svg.getBoundingClientRect().width === 0;
                            if (needsRender) {
                                node.textContent = node.getAttribute('data-mermaid-source');
                                node.removeAttribute('data-processed');
                                toRender.push(node);
                            }
                        });
                        if (toRender.length > 0 && window.mermaid) {
                            var config = Object.assign({}, window.$docsify.mermaidConfig || {});
                            delete config.querySelector;
                            config.nodes = toRender;
                            window.mermaid.run(config);
                        }
                    }

                    hook.doneEach(function() {
                        // Listen for tab switches
                        var content = document.querySelector('.content');
                        if (content && !content._mermaidTabListener) {
                            content._mermaidTabListener = true;
                            content.addEventListener('click', function(e) {
                                var tab = e.target.closest('.docsify-tabs__tab');
                                if (!tab) return;
                                setTimeout(function() { reRenderMermaid(content); }, 50);
                            });
                        }

                        // Listen for details/expandable toggles
                        document.querySelectorAll('details').forEach(function(el) {
                            if (el._mermaidToggleListener) return;
                            el._mermaidToggleListener = true;
                            el.addEventListener('toggle', function() {
                                if (el.open) {
                                    setTimeout(function() { reRenderMermaid(el); }, 50);
                                }
                            });
                        });
                    });
                },
                function gbStepperPlugin(hook, vm) {
                    hook.afterEach(function (html) {
                        return html.replace(
                            /<!-- gb-stepper:start -->([\s\S]*?)<!-- gb-stepper:end -->/g,
                            function (_match, innerHtml) {
                                var steps = innerHtml.split(/<!-- gb-step:start -->/)
                                    .filter(function (s) { return s.trim().length > 0; });

                                var stepHtml = steps.map(function (stepContent, index) {
                                    var content = stepContent.replace(/<!-- gb-step:end -->/g, '').trim();

                                    // Extract the first heading to use as step title
                                    var titleMatch = content.match(/^(<h[1-6][^>]*>)([\s\S]*?)(<\/h[1-6]>)/);
                                    var title = '';
                                    var body = content;

                                    if (titleMatch) {
                                        title = titleMatch[2];
                                        body = content.slice(titleMatch[0].length).trim();
                                    }

                                    var stepNumber = index + 1;
                                    var isLast = index === steps.length - 1;

                                    return '<div class="gb-step">' +
                                        '<div class="gb-step-indicator">' +
                                            '<div class="gb-step-number">' + stepNumber + '</div>' +
                                            (!isLast ? '<div class="gb-step-line"></div>' : '') +
                                        '</div>' +
                                        '<div class="gb-step-content">' +
                                            (title ? '<div class="gb-step-title">' + title + '</div>' : '') +
                                            (body ? '<div class="gb-step-body">' + body + '</div>' : '') +
                                        '</div>' +
                                    '</div>';
                                });

                                return '<div class="gb-stepper">' + stepHtml.join('') + '</div>';
                            }
                        );
                    });
                }
            ],
        }
    </script>
      <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/h-hg/docsify-image-caption/dist/docsify-image-caption.min.js"></script>
    <script src="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/docsify-plugin-toc.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/d3@7"></script>
    <script type="module">
        import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
        mermaid.initialize({
            startOnLoad: true,
            theme: 'base',
            themeVariables: {
                // Base palette (matches site dark theme)
                background:        '#0f1115',
                primaryColor:      '#1b2130',  // node fill
                primaryTextColor:  '#e6e6e6',  // node text
                primaryBorderColor:'#7c5cff',  // node border (accent)
                secondaryColor:    '#222a3c',
                tertiaryColor:     '#151923',

                // Lines / arrows — must be light to read on dark bg
                lineColor:         '#cbd5e1',
                textColor:         '#e6e6e6',

                // Flowchart nodes + subgraphs (graph TD / LR / TB)
                mainBkg:           '#1b2130',  // node fill
                nodeBorder:        '#7c5cff',
                nodeTextColor:     '#e6e6e6',
                clusterBkg:        '#151923',  // subgraph background (was yellow)
                clusterBorder:     'rgba(124, 92, 255, 0.4)',
                titleColor:        '#e6e6e6',  // subgraph title
                defaultLinkColor:  '#cbd5e1',

                // Sequence diagrams
                actorBkg:           '#1b2130',
                actorBorder:        '#7c5cff',
                actorTextColor:     '#ffffff',
                actorLineColor:     '#cbd5e1',  // vertical lifelines
                signalColor:        '#cbd5e1',  // message arrows
                signalTextColor:    '#ffffff',
                labelBoxBkgColor:   '#222a3c',
                labelBoxBorderColor:'#7c5cff',
                labelTextColor:     '#ffffff',
                loopTextColor:      '#ffffff',
                noteBkgColor:       '#3a2e10',
                noteBorderColor:    '#f59e0b',
                noteTextColor:      '#ffffff',
                activationBkgColor: '#2b3245',
                activationBorderColor:'#7c5cff',

                // State / class diagrams
                edgeLabelBackground:    '#1b2130',
                classText:              '#e6e6e6',
                stateBkg:               '#1b2130',
                stateLabelColor:        '#e6e6e6',
                compositeBackground:    '#151923',
                compositeBorder:        'rgba(124, 92, 255, 0.4)',
                compositeTitleBackground:'#222a3c',
                altBackground:          '#222a3c',
                transitionColor:        '#cbd5e1',
                transitionLabelColor:   '#e6e6e6',
                specialStateColor:      '#7c5cff'
            }
        });

        // Wrap mermaid.run to preserve source text before rendering.
        // Mermaid replaces div content with SVG and marks data-processed,
        // so we save the original code to enable re-rendering in hidden containers.
        const originalRun = mermaid.run.bind(mermaid);
        mermaid.run = async function(config) {
            const nodes = config && config.nodes
                ? config.nodes
                : document.querySelectorAll((config && config.querySelector) || '.mermaid');
            nodes.forEach(function(node) {
                if (!node.getAttribute('data-mermaid-source') && node.textContent.trim()) {
                    node.setAttribute('data-mermaid-source', node.textContent.trim());
                }
            });
            return originalRun(config);
        };

        window.mermaid = mermaid;
    </script>
    <script src="//unpkg.com/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
    <script src="//unpkg.com/docsify-mermaid-zoom/dist/docsify-mermaid-zoom.js"></script>
    <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-breadcrumb@latest/dist/index.min.js"></script>
    <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
    <script>
    (function () {
      function openParentsOf(el) {
        while (el) {
          if (el.tagName === 'DETAILS') el.open = true;
          el = el.parentElement;
        }
      }
      function handleHash() {
        const id = decodeURIComponent(location.hash || '').replace(/^#/, '');
        if (!id) return;
        const target = document.getElementById(id);
        if (target) openParentsOf(target);
      }
      window.addEventListener('hashchange', handleHash);
      document.addEventListener('DOMContentLoaded', handleHash);
      // Docsify re-renders; hook into its doneEach
      window.$docsify = window.$docsify || {};
      const oldDone = window.$docsify.doneEach;
      window.$docsify.doneEach = function () { handleHash(); if (oldDone) oldDone(); };
    })();
    </script>
</body>
</html>
